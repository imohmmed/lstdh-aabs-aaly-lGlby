kind = "web"
previewPath = "/"
title = "الأستاذ عباس علي الغالبي"
version = "1.0.0"
id = "artifacts/al-ghalbi"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24405
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/al-ghalbi run dev"

[services.env]
PORT = "24405"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/al-ghalbi", "run", "build"]
publicDir = "artifacts/al-ghalbi/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
